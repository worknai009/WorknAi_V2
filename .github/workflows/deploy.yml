name: Deploy WorknAi_V2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/worknai-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/worknai-frontend:latest
        build-args: |
          VITE_API_BASE_URL=https://api.worknai.online
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Admin
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.admin
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/worknai-admin:latest
        build-args: |
          VITE_API_BASE_URL=https://api.worknai.online
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Manager
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.manager
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/worknai-manager:latest
        build-args: |
          VITE_API_BASE_URL=https://api.worknai.online
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          mkdir -p /var/www/worknai_v2
          cd /var/www/worknai_v2

          cat > .env <<EOF
          MONGO_URI=${{ secrets.MONGODB_URI }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          VITE_API_BASE_URL=https://api.worknai.online
          EOF

          cat > docker-compose.yml <<EOF
          version: '3.8'
          services:
            backend:
              image: ${{ secrets.DOCKER_USERNAME }}/worknai-backend:latest
              container_name: worknai_v2_backend
              ports:
                - "5001:5000"
              env_file:
                - /var/www/worknai_v2/.env
              environment:
                - NODE_ENV=production
                - MONGO_URI=${{ secrets.MONGODB_URI }}
                - JWT_SECRET=${{ secrets.JWT_SECRET }}
                - PORT=5000
              restart: always
              networks:
                - worknai_v2_network

            frontend:
              image: ${{ secrets.DOCKER_USERNAME }}/worknai-frontend:latest
              container_name: worknai_v2_frontend
              ports:
                - "3000:80"
              restart: always
              networks:
                - worknai_v2_network
              depends_on:
                - backend

            admin:
              image: ${{ secrets.DOCKER_USERNAME }}/worknai-admin:latest
              container_name: worknai_v2_admin
              ports:
                - "3003:80"
              restart: always
              networks:
                - worknai_v2_network
              depends_on:
                - backend

            manager:
              image: ${{ secrets.DOCKER_USERNAME }}/worknai-manager:latest
              container_name: worknai_v2_manager
              ports:
                - "3002:80"
              restart: always
              networks:
                - worknai_v2_network
              depends_on:
                - backend

          networks:
            worknai_v2_network:
              driver: bridge
          EOF

          docker pull ${{ secrets.DOCKER_USERNAME }}/worknai-backend:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/worknai-frontend:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/worknai-admin:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/worknai-manager:latest

          docker compose down
          docker compose up -d
          docker compose ps