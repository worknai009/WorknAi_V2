name: Deploy WorknAi_V2

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Backend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.backend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/worknai-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Frontend
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.frontend
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/worknai-frontend:latest
        build-args: |
          VITE_API_BASE_URL=https://api.worknai.com
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Admin
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.admin
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/worknai-admin:latest
        build-args: |
          VITE_API_BASE_URL=https://api.worknai.com
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Manager
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.manager
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/worknai-manager:latest
        build-args: |
          VITE_API_BASE_URL=https://api.worknai.com
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          cd /var/www/worknai_v2
          
          # Pull latest code
          git pull origin main
          
          # Create .env file if it doesn't exist
          if [ ! -f .env ]; then
            echo "MONGODB_URI=${{ secrets.MONGODB_URI }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "VITE_API_BASE_URL=https://api.worknai.com" >> .env
          fi
          
          # Pull latest Docker images
          docker pull ${{ secrets.DOCKER_USERNAME }}/worknai-backend:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/worknai-frontend:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/worknai-admin:latest
          docker pull ${{ secrets.DOCKER_USERNAME }}/worknai-manager:latest
          
          # Stop and remove old containers
          docker-compose down
          
          # Update docker-compose to use latest images
          sed -i 's|build:|image: ${{ secrets.DOCKER_USERNAME }}|g' docker-compose.yml
          
          # Start new containers
          docker-compose up -d
          
          # Verify containers are running
          docker-compose ps