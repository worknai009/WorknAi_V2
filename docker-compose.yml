version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: worknai_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
    restart: always
    networks:
      - worknai_network
    volumes:
      - ./backend/.env:/app/.env:ro

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: worknai_frontend
    ports:
      - "3000:3000"
    restart: always
    networks:
      - worknai_network
    depends_on:
      - backend

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: worknai_admin
    ports:
      - "3001:3001"
    restart: always
    networks:
      - worknai_network
    depends_on:
      - backend

  manager:
    build:
      context: .
      dockerfile: Dockerfile.manager
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    container_name: worknai_manager
    ports:
      - "3002:3002"
    restart: always
    networks:
      - worknai_network
    depends_on:
      - backend

networks:
  worknai_network:
    driver: bridge