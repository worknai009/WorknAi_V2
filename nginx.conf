# Redirect HTTP to HTTPS for all domains
server {
    listen 80;
    listen [::]:80;
    server_name worknai.com worknai.in worknai.online api.worknai.com api.worknai.in api.worknai.online admin.worknai.com admin.worknai.in admin.worknai.online manager.worknai.com manager.worknai.in manager.worknai.online;
    
    return 301 https://$server_name$request_uri;
}

# =====================
# FRONTEND - Main Site
# =====================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name worknai.com www.worknai.com;

    ssl_certificate /etc/letsencrypt/live/worknai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/worknai.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://worknai_frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

